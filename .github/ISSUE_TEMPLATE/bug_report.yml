name: Bug report
description: Report a reproducible bug
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal and reproducible case.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Briefly describe the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands and files needed to reproduce.
      placeholder: |
        1. mkdir ...
        2. ff ...
        3. observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: fastfind version
      description: Output of `ff --version`
      placeholder: fastfind 1.0.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Linux 6.x / macOS / BSD / Windows
    validations:
      required: true

