name: Feature request
description: Propose a new feature or improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard to do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected CLI behavior, flags, or output.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing workarounds or other tools.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Benchmarks, examples, links, etc.
    validations:
      required: false

